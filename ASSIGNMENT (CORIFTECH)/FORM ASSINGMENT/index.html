<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geeks For Geeks Form</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Geeks for Geeks Survey Form</h1>
    </header>
    <main>
        <section>
            <form action="">
                <label for="name">Name</label> <br>
                <input type="text" name="name" class="textbox" id="name" placeholder="Enter your name "> <br> <br>

                <label for="email"> Email </label> <br>
                <input type="email" name="email" class="textbox" id="email" placeholder="Enter your email"> <br><br>

                <label for="age">Age</label> <br>
                <input type="number" name="age" class="textbox" id="age" placeholder="Enter your age"> <br><br>

                <label for="option">Which option best describes you? </label> <br>
                <select name="option" class="option" id="option">
                    <option value="">Student</option>
                    <option value="">Lecturer</option>
                    <option value="">Graduate</option>
                    <option value="">Under-graduate</option>
                </select> <br> <br>

                <p for="choice"> Would you  recommend GeeksforGeeks to a friend?</p>

                <input type="radio" name="choice" id="yes">
                <label for="yes">Yes</label> <br>
                
                <input type="radio" name="choice" id="no">
                <label for="no">No </label> <br>
                
                <input type="radio" name="choice" id="maybe">
                <label for="maybe">Maybe</label> <br> <br>

                <p>Languages and Framework known (check all that apply)</p>

                <label>
                    <input type="checkbox" name="languages" value="C"> 
                    C 
                </label> <br>

                <label>
                    <input type="checkbox" name="languages" value="C++">
                    C++
                </label> <br>
                
                <label>
                    <input type="checkbox" name="languages" value="C#">
                    C#
                </label> <br>

                <label>
                    <input type="checkbox" name="languages" value="Python">
                    Python
                </label> <br>

                <label>
                    <input type="checkbox" name="languages" value="JavaScript">
                    JavaScript
                </label> <br>

                <label>
                    <input type="checkbox" name="languages" value="Java">
                    Java
                </label> <br>
                
                <label>
                    <input type="checkbox" name="languages" value="React">
                    React
                </label> <br>
                
                <label>
                    <input type="checkbox" name="languages" value="Angular">
                    Angular
                </label> <br>
                
                
                <label>
                    <input type="checkbox" name="languages" value="Django">
                    Django
                </label> <br>
                
                <label>
                    <input type="checkbox" name="languages" value="Spring">
                    Spring
                </label> <br> <br><br>

                <label for="txt">Any comments or suggestions</label> <br>
                <textarea name="txt" id="txt" class="txt" fixed ></textarea> <br><br>

                <button type="submit">Submit</button>
            </form>
        </section>
    </main>
</body>
</html>
