<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
        <h1>Geeks for Geeks Survey Form</h1>
    </header>
    <main>
        <section>
            <form action="">
                <label for="name">Name</label> <br>
                <input type="text" name="name" id="name" placeholder="Enter your name "> <br> <br>

                <label for="email"> Email </label> <br>
                <input type="email" name="email" id="email" placeholder="Enter your email"> <br><br>

                <label for="age">Age</label> <br>
                <input type="number" name="age" id="age" placeholder="Enter your age"> <br><br>

                <label for="option">Which option best describes you? </label> <br>
                <select name="option" id="option">
                    <option value="">Student</option>
                    <option value="">Lecturer</option>
                    <option value="">Graduate</option>
                    <option value="">Under-graduate</option>
                </select> <br> <br>

                <p for="choice"> Would you  recommend GeeksforGeeks to a friend?</p>

                <input type="radio" name="choice" id="yes">
                <label for="yes">Yes</label> <br>
                
                <input type="radio" name="choice" id="no">
                <label for="no">No </label> <br>
                
                <input type="radio" name="choice" id="maybe">
                <label for="maybe">Maybe</label> <br>

                <p>Languages and Framework known (check all that apply)</p>

                (label+ input:checkbox)*3
            </form>
        </section>
    </main>
</body>
</html>
